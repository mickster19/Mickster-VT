<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mines 5x5 Predictor Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f111a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #1a1d29;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 400px;
            width: 100%;
            border: 1px solid #2a2f45;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 5px;
            color: #00ffcc;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 12px;
            color: #8c94b5;
            margin-bottom: 20px;
        }

        /* Muundo wa Gridi ya 5x5 */
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            background: #11141e;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .cell {
            aspect-ratio: 1;
            background: #232736;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            transition: all 0.3s ease;
            border: 1px solid #2d3247;
        }

        /* Mtindo wa Nyota Inapopatikana */
        .cell.star {
            background: radial-gradient(circle, #00ffcc 0%, #009977 100%);
            box-shadow: 0 0 15px #00ffcc;
            border-color: #00ffcc;
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); }
            100% { transform: scale(1); }
        }

        /* Kitufe cha Next Signal */
        .btn {
            background: #00ffcc;
            color: #0f111a;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.3);
        }

        .btn:hover {
            background: #00ccaa;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .footer {
            margin-top: 15px;
            font-size: 11px;
            color: #535975;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Mines Bot Demo</h1>
        <p class="subtitle">Inatabiri nyota 4 salama kwenye gridi</p>

        <div class="grid" id="minesGrid"></div>

        <button class="btn" onclick="generateSignal()">NEXT SIGNAL 🌟</button>

        <p class="footer">Kumbuka: Hii ni demo ya algorithm ya kubahatisha tu.</p>
    </div>

    <script>
        const gridContainer = document.getElementById('minesGrid');
        const totalCells = 25;
        let cells = [];

        // 1. Kutengeneza masanduku 25 mara ya kwanza programu ikifunguka
        function createGrid() {
            gridContainer.innerHTML = '';
            cells = [];
            for (let i = 0; i < totalCells; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.innerText = '❓'; // Alama ya mwanzo
                gridContainer.appendChild(cell);
                cells.push(cell);
            }
        }

        // 2. Kazi ya kubofya "Next Signal"
        function generateSignal() {
            // Kusafisha gridi iliyopita kurudi kwenye hali ya kawaida
            cells.forEach(cell => {
                cell.classList.remove('star');
                cell.innerText = '❓';
            });

            // Kutengeneza list ya namba 0 hadi 24
            let positions = Array.from({length: totalCells}, (_, i) => i);
            let safePositions = [];

            // Kuchagua nafasi 4 za kipekee kwa kubahatisha (Random)
            for (let i = 0; i < 4; i++) {
                const randomIndex = Math.floor(Math.random() * positions.length);
                const chosenPos = positions.splice(randomIndex, 1)[0];
                safePositions.push(chosenPos);
            }

            // Kuweka nyota kwenye nafasi hizo 4 zilizochaguliwa
            safePositions.forEach(pos => {
                cells[pos].classList.add('star');
                cells[pos].innerText = '⭐';
            });
        }

        // Kuanzisha gridi mara tu ukurasa unapofunguka
        createGrid();
    </script>

</body>
</html>
